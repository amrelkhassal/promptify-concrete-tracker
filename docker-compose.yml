services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptify
      POSTGRES_PASSWORD: promptify
      POSTGRES_DB: promptify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptify"]
      interval: 3s
      timeout: 3s
      retries: 20

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: ["azurite-blob", "--blobHost", "0.0.0.0", "--loose"]
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://promptify:promptify@postgres:5432/promptify
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./data:/app/data

volumes:
  pgdata:
  azurite-data:
